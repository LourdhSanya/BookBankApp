<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Book Bank</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Flash messages -->
<div class="flash-container" id="flashContainer">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}" onclick="this.remove()">
        <span>{{ message }}</span>
        <span class="flash-close">&times;</span>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">B</span>
      <h1>Book Bank</h1>
      <p>Create your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-control" id="name" name="name"
               type="text" placeholder="Enter your full name"
               autocomplete="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username"
               type="text" placeholder="Choose a username"
               autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" name="password"
               type="password" placeholder="Create a password"
               autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input class="form-control" id="confirm_password" name="confirm_password"
               type="password" placeholder="Re-enter your password"
               autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-muted)">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" style="color:var(--teal);text-decoration:none;font-weight:600">Sign In</a>
    </p>
  </div>
</div>

<script>
  setTimeout(() => {
    document.querySelectorAll('.flash').forEach(el => el.remove());
  }, 5000);
</script>
</body>
</html>
